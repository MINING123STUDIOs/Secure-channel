<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Secure Channel Assistant v2</title>

<style>
body {
  margin:0;
  font-family: system-ui, Arial;
  background:#0b1220;
  color:#e5e7eb;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:16px;
  display:grid;
  gap:12px;
}

h1 { font-size:18px; margin:8px 0; }

.panel {
  background:#111827;
  padding:14px;
  border-radius:12px;
  border:1px solid #1f2937;
}

textarea, pre, input {
  width:100%;
  box-sizing:border-box;
  background:#0b1220;
  color:#e5e7eb;
  border:1px solid #334155;
  border-radius:8px;
  padding:10px;
}

textarea { min-height:90px; }

.row {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:12px;
}

button {
  margin-top:8px;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

button:hover { background:#1d4ed8; }

.small { font-size:12px; color:#94a3b8; }

.keybox {
  display:flex;
  gap:8px;
  align-items:center;
}

.iconbtn {
  background:#1f2937;
  padding:8px 10px;
  border-radius:8px;
}

@media (max-width: 800px) {
  .row { grid-template-columns: 1fr; }
}

.hidden { display:none; }
</style>
</head>

<body>
<div class="container">
<h1>🔐 Secure Channel Assistant v2 (ECDH + AES-GCM + HMAC)</h1>

<div class="panel">
  <h3>1. Key Generation</h3>

  <button onclick="generateKeys()">Generate Key Pair</button>

  <div class="small">Public Key (share)</div>
  <div class="keybox">
    <textarea id="pubKey" readonly></textarea>
    <button class="iconbtn" onclick="copy('pubKey')">📋</button>
  </div>

  <div class="small">Private Key</div>
  <div class="keybox">
    <input id="privKey" type="password" readonly />
    <button class="iconbtn" onclick="togglePriv()">👁️</button>
    <button class="iconbtn" onclick="copy('privKey')">📋</button>
  </div>
</div>

<div class="panel">
  <h3>2. Peer Key + Shared Secret</h3>

  <textarea id="peerKey" placeholder="Paste peer public key"></textarea>
  <button onclick="derive()">Derive Shared Secret</button>

  <pre id="status"></pre>
</div>

<div class="panel row">
  <div>
    <h3>3. Encrypt</h3>
    <textarea id="msg" placeholder="Message..."></textarea>
    <button onclick="encrypt()">Encrypt</button>
    <button class="iconbtn" onclick="copy('cipherOut')">📋</button>
    <pre id="cipherOut"></pre>
  </div>

  <div>
    <h3>4. Decrypt</h3>
    <textarea id="cipherIn" placeholder="Paste payload JSON"></textarea>
    <button onclick="decrypt()">Decrypt</button>
    <pre id="plainOut"></pre>
  </div>
</div>

</div>

<script>
let kp;
let sharedKey;
let hmacKey;

function b64(buf){
  return btoa(String.fromCharCode(...new Uint8Array(buf)));
}
function unb64(b){
  return Uint8Array.from(atob(b), c => c.charCodeAt(0));
}

async function generateKeys(){
  kp = await crypto.subtle.generateKey(
    { name:"ECDH", namedCurve:"P-256" },
    true,
    ["deriveKey"]
  );

  const pub = await crypto.subtle.exportKey("spki", kp.publicKey);
  const priv = await crypto.subtle.exportKey("pkcs8", kp.privateKey);

  document.getElementById("pubKey").value = b64(pub);
  document.getElementById("privKey").value = b64(priv);
}

function togglePriv(){
  const el = document.getElementById("privKey");
  el.type = el.type === "password" ? "text" : "password";
}

async function derive(){
  const peer = document.getElementById("peerKey").value.trim();

  const peerKey = await crypto.subtle.importKey(
    "spki",
    unb64(peer),
    { name:"ECDH", namedCurve:"P-256" },
    true,
    []
  );

  sharedKey = await crypto.subtle.deriveKey(
    { name:"ECDH", public: peerKey },
    kp.privateKey,
    { name:"AES-GCM", length:256 },
    false,
    ["encrypt","decrypt"]
  );

  // derive HMAC key from same material (separate binding layer)
  const raw = await crypto.subtle.exportKey("raw",
    await crypto.subtle.deriveBits(
      { name:"ECDH", public: peerKey },
      kp.privateKey,
      256
    )
  );

  hmacKey = await crypto.subtle.importKey(
    "raw",
    raw,
    { name:"HMAC", hash:"SHA-256" },
    false,
    ["sign","verify"]
  );

  document.getElementById("status").textContent =
    "✔ Shared keys established (AES-GCM + HMAC-SHA256)";
}

async function encrypt(){
  if(!sharedKey || !hmacKey) return alert("No shared secret");

  const iv = crypto.getRandomValues(new Uint8Array(12));
  const data = new TextEncoder().encode(document.getElementById("msg").value);

  const cipher = await crypto.subtle.encrypt(
    { name:"AES-GCM", iv },
    sharedKey,
    data
  );

  const packetBase = iv.toString() + b64(cipher);

  const sig = await crypto.subtle.sign(
    "HMAC",
    hmacKey,
    new TextEncoder().encode(packetBase)
  );

  const payload = {
    v:1,
    iv: b64(iv),
    data: b64(cipher),
    mac: b64(sig),
    ts: Date.now()
  };

  const out = JSON.stringify(payload,null,2);
  document.getElementById("cipherOut").textContent = out;
}

async function decrypt(){
  if(!sharedKey || !hmacKey) return alert("No shared secret");

  try {
    const p = JSON.parse(document.getElementById("cipherIn").value);

    const iv = unb64(p.iv);
    const data = unb64(p.data);
    const mac = unb64(p.mac);

    const base = iv.toString() + p.data;

    const ok = await crypto.subtle.verify(
      "HMAC",
      hmacKey,
      mac,
      new TextEncoder().encode(base)
    );

    if(!ok) throw new Error("auth fail");

    const plain = await crypto.subtle.decrypt(
      { name:"AES-GCM", iv },
      sharedKey,
      data
    );

    document.getElementById("plainOut").textContent =
      new TextDecoder().decode(plain);

  } catch(e){
    document.getElementById("plainOut").textContent =
      "❌ Failed: invalid ciphertext or authentication mismatch";
  }
}

function copy(id){
  const el = document.getElementById(id);
  navigator.clipboard.writeText(el.value || el.textContent);
}
</script>
</body>
</html>
