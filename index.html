<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Secure Channel Assistant (ECDH + AES-GCM)</title>
<style>
body { font-family: Arial, sans-serif; background:#0f172a; color:#e2e8f0; padding:20px; }
.container { max-width: 1000px; margin:auto; }
h1 { font-size: 20px; }
.panel { background:#111827; padding:15px; margin:10px 0; border-radius:10px; }
textarea, input {
  width:100%; padding:10px; margin-top:5px;
  background:#0b1220; color:#e2e8f0; border:1px solid #334155;
  border-radius:8px;
}
button {
  margin-top:10px; padding:10px;
  background:#2563eb; border:none; color:white;
  border-radius:8px; cursor:pointer;
}
button:hover { background:#1d4ed8; }
.row { display:flex; gap:10px; }
.col { flex:1; }
small { color:#94a3b8; }
pre { white-space: pre-wrap; word-break: break-word; }
</style>
</head>
<body>
<div class="container">
<h1>🔐 Secure Channel Assistant (ECDH + AES-GCM Demo)</h1>

<div class="panel">
  <h3>1. Key Generation (Local)</h3>
  <button onclick="generateKeys()">Generate Key Pair</button>
  <pre id="keys"></pre>
</div>

<div class="panel">
  <h3>2. Shared Secret Derivation</h3>
  <p><small>Paste peer public key (base64):</small></p>
  <textarea id="peerKey"></textarea>
  <button onclick="deriveSecret()">Derive Shared Key</button>
  <pre id="secretOut"></pre>
</div>

<div class="panel row">
  <div class="col">
    <h3>3. Encrypt Message</h3>
    <textarea id="plain" placeholder="Type message..."></textarea>
    <button onclick="encryptMsg()">Encrypt</button>
    <pre id="cipherOut"></pre>
  </div>

  <div class="col">
    <h3>4. Decrypt Message</h3>
    <textarea id="cipher" placeholder="Paste ciphertext JSON..."></textarea>
    <button onclick="decryptMsg()">Decrypt</button>
    <pre id="plainOut"></pre>
  </div>
</div>

</div>

<script>
let keyPair;
let sharedKey;

function bufToB64(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)));
}
function b64ToBuf(b64) {
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}

async function generateKeys() {
  keyPair = await crypto.subtle.generateKey(
    { name: "ECDH", namedCurve: "P-256" },
    true,
    ["deriveKey"]
  );

  const pub = await crypto.subtle.exportKey("spki", keyPair.publicKey);

  document.getElementById("keys").textContent =
    "Public Key (share this):\n" + bufToB64(pub);
}

async function deriveSecret() {
  const peerB64 = document.getElementById("peerKey").value.trim();
  const peerBuf = b64ToBuf(peerB64);

  const peerKey = await crypto.subtle.importKey(
    "spki",
    peerBuf,
    { name: "ECDH", namedCurve: "P-256" },
    true,
    []
  );

  sharedKey = await crypto.subtle.deriveKey(
    { name: "ECDH", public: peerKey },
    keyPair.privateKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt", "decrypt"]
  );

  document.getElementById("secretOut").textContent =
    "✔ Shared AES-GCM key established.";
}

async function encryptMsg() {
  if (!sharedKey) return alert("No shared key yet.");

  const iv = crypto.getRandomValues(new Uint8Array(12));
  const text = new TextEncoder().encode(document.getElementById("plain").value);

  const ct = await crypto.subtle.encrypt(
    { name: "AES-GCM", iv },
    sharedKey,
    text
  );

  const payload = {
    iv: bufToB64(iv),
    data: bufToB64(ct)
  };

  document.getElementById("cipherOut").textContent =
    JSON.stringify(payload, null, 2);
}

async function decryptMsg() {
  if (!sharedKey) return alert("No shared key yet.");

  try {
    const payload = JSON.parse(document.getElementById("cipher").value);

    const iv = b64ToBuf(payload.iv);
    const data = b64ToBuf(payload.data);

    const pt = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv },
      sharedKey,
      data
    );

    document.getElementById("plainOut").textContent =
      new TextDecoder().decode(pt);

  } catch (e) {
    document.getElementById("plainOut").textContent =
      "❌ Decryption failed (tampered or wrong key)";
  }
}
</script>
</body>
</html>
